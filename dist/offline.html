<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <title>离线 - GrowthOS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .features {
      text-align: left;
      background: #f9fafb;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
    }
    
    .feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .feature:last-child {
      margin-bottom: 0;
    }
    
    .feature-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    
    .feature-text {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.5;
    }
    
    .feature-text strong {
      color: #1f2937;
      font-weight: 600;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(102, 126, 234, 0.5);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      margin-top: 24px;
      padding: 16px;
      background: #eff6ff;
      border-radius: 12px;
      font-size: 14px;
      color: #3b82f6;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .spinner {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>您已离线</h1>
    <p>
      GrowthOS 会在网络恢复后自动同步您的数据。在此之前，您仍然可以继续使用已缓存的内容。
    </p>
    
    <div class="features">
      <div class="feature">
        <span class="feature-icon">✅</span>
        <span class="feature-text">
          <strong>已缓存数据可用</strong><br>
          查看和管理本地存储的成长记录、目标、提醒
        </span>
      </div>
      <div class="feature">
        <span class="feature-icon">📝</span>
        <span class="feature-text">
          <strong>离线可继续记录</strong><br>
          新增的记录会在网络恢复后自动同步
        </span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔄</span>
        <span class="feature-text">
          <strong>自动同步</strong><br>
          网络恢复后无需手动操作，数据自动同步
        </span>
      </div>
    </div>
    
    <button class="btn" id="retryBtn" onclick="retry()">
      <span>重试连接</span>
    </button>
    
    <div class="status" id="status">
      等待网络连接...
    </div>
  </div>
  
  <script>
    const statusEl = document.getElementById('status');
    const retryBtn = document.getElementById('retryBtn');
    
    function updateStatus(online) {
      if (online) {
        statusEl.textContent = '✅ 网络已恢复！正在跳转...';
        statusEl.style.background = '#dcfce7';
        statusEl.style.color = '#16a34a';
        retryBtn.disabled = true;
        retryBtn.innerHTML = '<span class="spinner">⏳</span><span>加载中...</span>';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        statusEl.textContent = '等待网络连接...';
        statusEl.style.background = '#eff6ff';
        statusEl.style.color = '#3b82f6';
        retryBtn.disabled = false;
        retryBtn.innerHTML = '<span>🔄</span><span>重试连接</span>';
      }
    }
    
    function retry() {
      updateStatus(navigator.onLine);
    }
    
    window.addEventListener('online', () => updateStatus(true));
    window.addEventListener('offline', () => updateStatus(false));
    
    if (navigator.onLine) {
      updateStatus(true);
    }
  </script>
</body>
</html>
